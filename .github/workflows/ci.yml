name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: test -z "$(gofmt -l cmd internal)"
      - run: go test ./...
      - run: go vet ./...
      - run: go build -o bin/shine ./cmd/shine
      - run: npm run test:npm
